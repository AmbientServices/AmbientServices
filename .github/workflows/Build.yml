name: Build .NET

on:
  push:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install dotnet-set-version
      run: dotnet tool install --global dotnet-set-version
    - name: Run dotnet-set-version
      run: dotnet-set-version 0.9.${{ github.run_number }} ${{ github.sha }} -NoPackageOutputPath
    - name: Install dotnet-markdown-sample-code
      run: dotnet tool install --global dotnet-markdown-sample-code
    - name: Build AmbientServices
      run: dotnet build AmbientServices -c Release
    - name: Build AmbientServices.Samples
      run: dotnet build AmbientServices.Samples -c Release
    - name: Build AmbientServices.Test.DelayedLoad
      run: dotnet build AmbientServices.Test.DelayedLoad -c Release
    - name: Build AmbientServices.Test
      run: dotnet build AmbientServices.Test -c Release
    - name: Package
      run: dotnet pack AmbientServices -c Release
    - name: Test .NET 10 with coverage
      run: dotnet test -c Release -f net10.0 --collect:"Code Coverage" --settings CodeCoverage.runsettings --logger:"trx;LogFileName=unit.testresults.trx" --blame-hang-timeout 120s
    - name: ReportGenerator
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.9
      with:
        reports: '**/*.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;Badges'
        sourcedirs: ''
        historydir: ''
        plugins: ''
        assemblyfilters: '+*'
        classfilters: '+*'
        filefilters: '+*'
        verbosity: 'Info'
        title: ''
        tag: '${{ github.run_number }}_${{ github.run_id }}'
        license: ''
        customSettings: ''
        toolpath: 'reportgeneratortool'
    - name: Upload GitHub Pages artifact (coverage HTML + badges)
      uses: actions/upload-pages-artifact@v5
      with:
        path: coveragereport
    - name: Upload coverage report (workflow artifact)
      uses: actions/upload-artifact@v7
      with:
        name: CoverageReport
        path: coveragereport
    - name: Upload NuGet packages for publish job
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: |
          AmbientServices/bin/Release/*.nupkg
          AmbientServices/bin/Release/*.snupkg

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy coverage report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages
      - name: Publish to NuGet
        run: |
          dotnet nuget push packages/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
          dotnet nuget push packages/*.snupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
