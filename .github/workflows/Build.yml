name: Build and Test

on:
  push:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install dotnet-set-version
      run: dotnet tool install --global dotnet-set-version
    - name: Run dotnet-set-version
      run: dotnet-set-version 0.9.${{ github.run_number }} ${{ github.sha }} -NoPackageOutputPath
    - name: Install dotnet-markdown-sample-code
      run: dotnet tool install --global dotnet-markdown-sample-code
    - name: Build AmbientServices
      run: dotnet build AmbientServices -c Release
    - name: Build AmbientServices.Samples
      run: dotnet build AmbientServices.Samples -c Release
    - name: Build AmbientServices.Test.DelayedLoad
      run: dotnet build AmbientServices.Test.DelayedLoad -c Release
    - name: Build AmbientServices.Test
      run: dotnet build AmbientServices.Test -c Release
    - name: Package
      run: dotnet pack AmbientServices -c Release
    - name: Test .NET 10 with coverage
      run: dotnet test -c Release -f net10.0 --collect:"Code Coverage" --settings CodeCoverage.runsettings --logger:"trx;LogFileName=unit.testresults.trx" --blame-hang-timeout 120s
    - name: ReportGenerator
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.9
      with:
        reports: '**/*.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;Badges'
        sourcedirs: ''
        historydir: ''
        plugins: ''
        assemblyfilters: '+*'
        classfilters: '+*'
        filefilters: '+*'
        verbosity: 'Info'
        title: ''
        tag: '${{ github.run_number }}_${{ github.run_id }}'
        license: ''
        customSettings: ''
        toolpath: 'reportgeneratortool'
    - name: Sync line coverage badge for README / NuGet (raw.githubusercontent.com)
      run: |
        mkdir -p docs
        PERCENT=$(grep -oE '[0-9]+(\.[0-9]+)?%' coveragereport/badge_shieldsio_linecoverage_green.svg | head -1)
        test -n "$PERCENT" || (echo "Could not read line coverage percent from ReportGenerator output." && exit 1)
        sed "s|__PERCENT__|${PERCENT}|g" docs/line-coverage.template.svg > docs/line-coverage.svg
    - name: Commit line coverage badge if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/line-coverage.svg
        if git diff --staged --quiet; then
          echo "Line coverage badge unchanged."
        else
          git commit -m "Update docs/line-coverage.svg [skip ci]"
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase --autostash origin "$BRANCH" && git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi
            echo "Pull/push failed (attempt ${attempt}); retrying after backoff..."
            sleep $((attempt * 3))
          done
          echo "Could not push badge update after retries."
          exit 1
        fi
    - name: Upload GitHub Pages artifact (coverage HTML + badges)
      uses: actions/upload-pages-artifact@v5
      with:
        path: coveragereport
    - name: Upload coverage report (workflow artifact)
      uses: actions/upload-artifact@v7
      with:
        name: CoverageReport
        path: coveragereport
    - name: Upload NuGet packages for publish job
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: |
          AmbientServices/bin/Release/*.nupkg
          AmbientServices/bin/Release/*.snupkg

  # Requires: Settings → Pages → Build and deployment → Source: "GitHub Actions".
  # If Pages is off or source is still "Deploy from a branch", create deployment returns 404.
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy coverage report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: packages
      - name: Publish to NuGet
        run: |
          dotnet nuget push packages/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
          dotnet nuget push packages/*.snupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
